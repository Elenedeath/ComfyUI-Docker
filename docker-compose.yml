services:
  comfyui:
    image: hikage/comfyui-docker:latest
    container_name: comfyui
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all,compute,utility
    ports:
      - "8188:8188"
    volumes:
      # persist your models:
      - /mnt/.ix-apps/app_mounts/comfyui/models:/app/ComfyUI/models:rw

      # load your input content:
      - /mnt/.ix-apps/app_mounts/comfyui/input:/app/ComfyUI/input:rw

      # persist your output content:
      - /mnt/.ix-apps/app_mounts/comfyui/output:/app/ComfyUI/output:rw

      # persist user settings:
      - /mnt/.ix-apps/app_mounts/comfyui/user:/app/ComfyUI/user:rw

    # https://docs.nvidia.com/datacenter/cloud-native/container-toolkit/latest/docker-specialized.html
    stdin_open: true
    tty: true
    restart: unless-stopped
x-notes: >
